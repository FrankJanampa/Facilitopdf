<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Extraer páginas PDF Online Gratis | FacilitoPDF</title>

<meta name="description" content="Extrae páginas específicas de archivos PDF online gratis. Selecciona páginas y descarga únicamente las páginas que necesitas rápidamente.">

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:system-ui,-apple-system,sans-serif;

    background:
    radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 30%),
    linear-gradient(to bottom, #111, #050505);

    color:white;

    min-height:100vh;
}

.tool-content{

    max-width:1250px;

    margin:auto;

    padding:40px 20px 100px;
}

.tool-box{

    margin-top:40px;

    background:rgba(255,255,255,0.04);

    border-radius:30px;

    padding:45px;

    border:1px solid rgba(255,255,255,0.06);

    box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

.tool-header{

    margin-bottom:35px;
}

.tool-header h1{

    font-size:54px;

    margin-bottom:22px;
}

.tool-header p{

    max-width:920px;

    line-height:1.95;

    font-size:18px;

    color:rgba(255,255,255,0.78);
}

.drop-zone{

    margin-top:30px;

    border:2px dashed rgba(255,255,255,0.18);

    border-radius:24px;

    padding:60px 30px;

    text-align:center;

    cursor:pointer;

    transition:0.3s ease;

    color:rgba(255,255,255,0.72);

    font-size:17px;
}

.drop-zone:hover{

    border-color:white;

    background:rgba(255,255,255,0.03);
}

.actions{

    margin-top:30px;

    display:flex;

    gap:15px;

    align-items:center;

    flex-wrap:wrap;
}

.actions button{

    border:none;

    padding:14px 24px;

    border-radius:14px;

    cursor:pointer;

    background:white;

    color:black;

    font-weight:600;

    transition:0.25s ease;
    height:52px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.actions button:hover{

    transform:translateY(-2px);
}

.status-msg{

    color:rgba(255,255,255,0.75);

    font-size:14px;
}

/* 🔥 PREVIEW */

.preview{

    margin-top:35px;

    display:grid;

    grid-template-columns:repeat(auto-fill, minmax(180px,1fr));

    gap:22px;
}

.page{

    position:relative;

    cursor:pointer;

    transition:0.25s ease;
}

.page:hover{

    transform:translateY(-4px);
}

.page canvas{

    width:100%;

    border-radius:14px;

    box-shadow:0 4px 16px rgba(0,0,0,0.25);
}

/* 🔥 SELECTOR */

.selector{

    position:absolute;

    top:10px;

    right:10px;

    width:34px;

    height:34px;

    border-radius:50%;

    background:rgba(0,0,0,0.7);

    border:2px solid rgba(255,255,255,0.5);

    display:flex;

    align-items:center;

    justify-content:center;

    font-weight:bold;

    font-size:18px;

    z-index:2;

    transition:0.2s ease;
}

.page.selected .selector{

    background:white;

    color:black;

    border-color:white;
}

.page.selected{

    transform:scale(0.98);

    opacity:0.95;
}

@media(max-width:768px){

    .tool-header h1{

        font-size:42px;
    }

    .tool-header p{

        font-size:17px;
    }

    .tool-box{

        padding:30px;
    }
}

</style>

</head>

<body>

<!-- 🔥 NAVBAR -->
{% include "components/navbar.html" %}

<main class="tool-content">

    <section class="tool-box">

        <div class="tool-header">

            <h1>
                Extraer páginas PDF
            </h1>

            <p>
                Selecciona páginas específicas de tus archivos PDF y descarga únicamente las páginas que necesitas rápidamente y sin complicaciones.
            </p>

        </div>

        <div id="extract-tool"></div>

    </section>

</main>

<!-- 🔥 FOOTER -->
{% include "components/footer.html" %}

<!-- PDF JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- TOOL -->
<script src="{{ url_for('static', filename='tools/extract.js') }}"></script>

<script>

/* =========================
   🔥 PDF WORKER
========================= */

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* =========================
   🔥 RENDER TOOL
========================= */

renderExtract(document.getElementById("extract-tool"));

/* =========================
   🔥 CLICK DROP ZONE
========================= */

document.addEventListener("click", function(e){

    if(e.target.classList.contains("drop-zone")){

        const input = e.target.querySelector("input");

        if(input){
            input.click();
        }
    }
});

/* =========================
   🔥 FIX VISUAL EXTRACT
========================= */

document.addEventListener("change", function(e){

    if(e.target.id === "extract-file"){

        setTimeout(() => {

            const preview = document.getElementById("preview");

            const dropZone = document.querySelector(".drop-zone");

            if(preview && preview.children.length > 0){

                dropZone.style.display = "none";
            }

        }, 500);
    }
});

</script>

</body>
</html>
